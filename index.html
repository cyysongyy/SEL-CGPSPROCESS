```html
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>SEL 英雄之旅地圖</title>

<style>

body{
font-family:"Microsoft JhengHei";
background:linear-gradient(#a8e0ff,#f0f9ff);
text-align:center;
padding:20px;
}

h1{
color:#1e40af;
}

#map{
position:relative;
width:900px;
height:450px;
margin:auto;
background:#d1fae5;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
overflow:hidden;
}

/* 路徑 */

.path{
position:absolute;
height:6px;
background:#64748b;
}

/* 關卡 */

.level{

position:absolute;
width:70px;
height:70px;
border-radius:50%;
background:white;
border:4px solid #2563eb;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
transition:0.2s;
}

.level:hover{
transform:scale(1.1);
}

.locked{
background:#94a3b8;
border-color:#64748b;
cursor:not-allowed;
}

.star{
position:absolute;
top:-18px;
font-size:20px;
color:gold;
display:none;
}

/* 任務視窗 */

#panel{

margin-top:25px;
background:white;
padding:25px;
border-radius:12px;
width:600px;
margin-left:auto;
margin-right:auto;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
display:none;

}

button{

padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
margin-top:15px;
cursor:pointer;

}

button:hover{
background:#1e3a8a;
}

.progress{
width:500px;
height:20px;
background:#ddd;
margin:auto;
margin-top:20px;
border-radius:20px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
border-radius:20px;
transition:0.5s;
}

</style>
</head>

<body>

<h1>🎮 SEL 英雄之旅地圖</h1>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="map">

<!-- 路徑 -->
<div class="path" style="top:120px;left:120px;width:160px"></div>
<div class="path" style="top:210px;left:280px;width:160px"></div>
<div class="path" style="top:120px;left:440px;width:160px"></div>
<div class="path" style="top:210px;left:600px;width:160px"></div>

<!-- 關卡 -->

<div class="level" style="top:90px;left:60px" onclick="openLevel(0)">
🏫
<div class="star" id="s0">⭐</div>
</div>

<div class="level locked" id="L1" style="top:180px;left:240px" onclick="openLevel(1)">
🌱
<div class="star" id="s1">⭐</div>
</div>

<div class="level locked" id="L2" style="top:90px;left:420px" onclick="openLevel(2)">
🌳
<div class="star" id="s2">⭐</div>
</div>

<div class="level locked" id="L3" style="top:180px;left:580px" onclick="openLevel(3)">
⚔
<div class="star" id="s3">⭐</div>
</div>

<div class="level locked" id="L4" style="top:90px;left:760px" onclick="openLevel(4)">
🏙
<div class="star" id="s4">⭐</div>
</div>

</div>

<div id="panel">

<h2 id="title"></h2>

<p id="text"></p>

<button onclick="complete()">完成關卡</button>

</div>


<script>

let current=0
let playing=0

const levels=[

{
title:"序章：召喚與覺醒",
text:"校園需要新的心動力。你準備帶領教師團隊開始 SEL 旅程。"
},

{
title:"第一關：奠基荒野",
text:"建立 Cool-down Corner、情緒溫度計、情緒卡。"
},

{
title:"第二關：實踐森林",
text:"建立圍圈文化、Check-in/out、雙語 SEL。"
},

{
title:"第三關：衝突深淵",
text:"三個感謝去激化、SEL數據儀表板、衝突修復。"
},

{
title:"最終關：永續之城",
text:"建立家校 SEL 生態圈與 ACE 系統。"
}

]

function openLevel(i){

if(i>current)return

playing=i

document.getElementById("panel").style.display="block"
document.getElementById("title").innerText=levels[i].title
document.getElementById("text").innerText=levels[i].text

}

function complete(){

document.getElementById("s"+playing).style.display="block"

current++

let progress=(current/5)*100
document.getElementById("bar").style.width=progress+"%"

let next=document.getElementById("L"+current)

if(next) next.classList.remove("locked")

if(current==5){

document.getElementById("title").innerText="🎉 SEL文化建立完成"
document.getElementById("text").innerText="你的校園已經建立完整的SEL生態系統。"

}

}

</script>

</body>
</html>
```
